services:
  # Vector Database
  qdrant:
    image: qdrant/qdrant:latest

    # Expose REST and gRPC ports
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC API

    # Persist vectors across container restarts
    volumes:
      - qdrant_storage:/qdrant/storage

    # Automatically restart after reboot
    restart: unless-stopped

volumes:
  # Named Docker volume
  qdrant_storage: